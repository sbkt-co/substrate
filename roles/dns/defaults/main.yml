---
# Public Cloudflare zone reconciliation for sbkt.co.
#
# substrate_domain and substrate_secrets_dir are fleet-wide vars defined in
# group_vars/all.yml; this role consumes them directly. Do NOT redefine those
# globals here.

# The public zone this role reconciles.
dns_zone: "{{ substrate_domain }}"

# Default record TTL (seconds) when a record does not pin its own.
dns_default_ttl: 300

# Path to the Cloudflare API token file the node reads at converge time.
# Format: a single line `CLOUDFLARE_API_TOKEN=<token>`.
dns_token_file: "{{ substrate_secrets_dir }}/cloudflare-dns.ini"

# Master switch: set false to skip DNS reconciliation on a node entirely.
dns_manage_enabled: true

# Privacy guard. Internal host names live under *.net.sbkt.co and are owned by
# MagicDNS (headscale) — they must NEVER appear in the public zone or CT logs.
# Any managed record name matching this suffix aborts the converge.
dns_forbidden_suffix: '\.net\.sbkt\.co$'
