---
# roles/resolver/handlers/main.yml
#
# CoreDNS restart/reload handlers, all guarded so the check-mode converge in a
# plain container (CI validate) never tries to talk to systemd.

- name: Reload systemd for coredns
  ansible.builtin.systemd:
    daemon_reload: true
  when: ansible_service_mgr == 'systemd'

# A binary/Corefile/wrapper change needs a full restart (new listener config).
- name: Restart coredns
  ansible.builtin.systemd:
    name: "{{ resolver_service_name }}"
    state: restarted
  when: ansible_service_mgr == 'systemd'

# A zone-file change only needs CoreDNS to re-read it; SIGUSR1 (the unit's
# ExecReload) reloads plugins without dropping the listener, so the resolver
# never blips for a membership change. Reload is only valid on a RUNNING service,
# though: before the tailnet is up the serve wrapper exits and CoreDNS is
# crash-looping (inactive), and `systemctl reload` on an inactive unit errors.
# Probe the state and reload only when active — a not-yet-started CoreDNS reads
# the current zone the moment it does start, so skipping the reload loses nothing.
- name: Probe CoreDNS active state before reloading
  ansible.builtin.systemd:
    name: "{{ resolver_service_name }}"
  register: resolver_active_probe
  changed_when: false
  when: ansible_service_mgr == 'systemd'

- name: Reload coredns
  ansible.builtin.systemd:
    name: "{{ resolver_service_name }}"
    state: reloaded
  when:
    - ansible_service_mgr == 'systemd'
    - (resolver_active_probe.status.ActiveState | default('')) == 'active'
