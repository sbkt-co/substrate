---
# The control-plane pointers and schedule (substrate_repo_url, substrate_branch,
# substrate_playbook, substrate_reconcile_*) are global vars defined in
# group_vars/all.yml, which always loads via local.yml. They are intentionally
# NOT redefined here: they are fleet-wide, not role-local, and the templates
# below consume them directly.

# Where ansible-pull checks out the repo on the node.
reconciler_workdir: /var/lib/substrate/repo

# Absolute path to ansible-pull. Overridable for venv-based installs.
reconciler_ansible_pull_bin: /usr/bin/ansible-pull

# Upper bound on a single converge. Type=oneshot defaults to
# TimeoutStartSec=infinity, so a hung ansible-pull would otherwise wedge the
# reconciler forever (see the service template for the full rationale).
reconciler_timeout_start_sec: "10min"

# Fleet-observability status file the service writes after every converge.
# Written by systemd at runtime (ExecStopPost) — never templated by Ansible.
reconciler_status_file: /etc/substrate/status.yml

# Failure alerting. On a failed converge, substrate-reconcile-failure.service
# runs this script, which POSTs a report to the webhook URL held in the file
# below. The URL is a node-local secret (0600, seeded out of band via
# scripts/seed-secret.sh) and never lives in git; the script skips loudly when
# it is absent, so this is a safe no-op on nodes that opt out of alerting.
reconciler_alert_script: /usr/local/sbin/substrate-reconcile-alert
reconciler_alert_webhook_file: /etc/substrate/secrets/alert-webhook
