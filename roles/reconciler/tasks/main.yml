---
# Installs the self-reconciliation loop: a systemd timer that periodically runs
# ansible-pull against main. This is what makes the fleet pull-based and removes
# any need for an operator workstation to push converges.

- name: Ensure Ansible is installed (the reconciler depends on it)
  ansible.builtin.package:
    name: ansible
    state: present

- name: Ensure reconciler checkout directory exists
  ansible.builtin.file:
    path: "{{ reconciler_workdir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

# Standalone-safety: the status file the service writes lives here. roles/common
# usually creates it, but the reconciler must not depend on that ordering.
- name: Ensure the substrate state directory exists
  ansible.builtin.file:
    path: "{{ reconciler_status_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install reconciler service unit
  ansible.builtin.template:
    src: substrate-reconcile.service.j2
    dest: /etc/systemd/system/substrate-reconcile.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

# Alerting script the failure-handler unit runs. Installed before the unit so
# its ExecStart target always exists. It reads a node-local webhook secret and
# POSTs a failure report, skipping loudly when no webhook is configured — so this
# is a plain file install with no systemd dependency.
- name: Install reconciler failure-alert script
  ansible.builtin.template:
    src: substrate-reconcile-alert.sh.j2
    dest: "{{ reconciler_alert_script }}"
    owner: root
    group: root
    mode: "0755"

# OnFailure extension point. Installed like the other units but never enabled or
# started — systemd activates it automatically when the reconciler fails.
- name: Install reconciler failure-handler unit
  ansible.builtin.template:
    src: substrate-reconcile-failure.service.j2
    dest: /etc/systemd/system/substrate-reconcile-failure.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Install reconciler timer unit
  ansible.builtin.template:
    src: substrate-reconcile.timer.j2
    dest: /etc/systemd/system/substrate-reconcile.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers so the timer sees the latest unit definitions
  ansible.builtin.meta: flush_handlers

- name: Enable and start the reconciler timer
  ansible.builtin.systemd:
    name: substrate-reconcile.timer
    enabled: true
    state: started
  when: ansible_service_mgr == 'systemd'
