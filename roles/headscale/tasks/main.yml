---
# Install and converge the headscale coordination server from a pinned upstream
# .deb, render its config, run it under systemd, and ensure the fleet's headscale
# user (namespace) exists so nodes can be issued preauth keys.
#
# Idempotent by design: the .deb is only fetched/installed when the installed
# version does not match headscale_version, and the user is only created when it
# is absent from `headscale users list`.

- name: Probe the installed headscale version
  ansible.builtin.command: headscale version
  register: headscale_installed
  changed_when: false
  failed_when: false
  check_mode: false

- name: Download the pinned headscale .deb
  ansible.builtin.get_url:
    url: "{{ headscale_deb_url }}"
    dest: "{{ headscale_deb_dest }}"
    mode: "0644"
  when: headscale_version not in (headscale_installed.stdout | default(''))

- name: Install the pinned headscale .deb
  ansible.builtin.apt:
    deb: "{{ headscale_deb_dest }}"
  when: headscale_version not in (headscale_installed.stdout | default(''))

- name: Ensure headscale config directory exists
  ansible.builtin.file:
    path: "{{ headscale_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure headscale data directory exists
  ansible.builtin.file:
    path: "{{ headscale_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Render headscale configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ headscale_config_dir }}/config.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart headscale

- name: Enable and start headscale
  ansible.builtin.systemd:
    name: "{{ headscale_service_name }}"
    enabled: true
    state: started
  when: ansible_service_mgr == 'systemd'

- name: Flush handlers so the user probe hits the running/restarted server
  ansible.builtin.meta: flush_handlers

- name: List existing headscale users
  ansible.builtin.command: headscale users list --output json
  register: headscale_users
  changed_when: false
  check_mode: false
  when: ansible_service_mgr == 'systemd'

- name: Create the fleet headscale user (namespace)
  ansible.builtin.command: headscale users create {{ headscale_user }}
  changed_when: true
  # Exact-match on the parsed JSON, not a substring of the raw output: a user
  # named e.g. "substrate-admin" must NOT satisfy the check for "substrate".
  when:
    - ansible_service_mgr == 'systemd'
    - >-
      headscale_users.stdout | default('[]') | from_json
      | selectattr('name', 'equalto', headscale_user) | list | length == 0

# --- Backup timer -----------------------------------------------------------
# Snapshots db.sqlite (via the SQLite online backup API) and noise_private.key
# into headscale_backup_dir on a systemd timer (default: daily). Snapshots are
# operator-pulled over the tailnet; S3 push automation is planned.

- name: Ensure sqlite3 CLI is present (required by the backup script)
  ansible.builtin.apt:
    name: sqlite3
    state: present

- name: Ensure headscale backup directory exists
  ansible.builtin.file:
    path: "{{ headscale_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install headscale backup script
  ansible.builtin.template:
    src: headscale-backup.sh.j2
    dest: "{{ headscale_backup_script }}"
    owner: root
    group: root
    mode: "0750"

- name: Install headscale backup service unit
  ansible.builtin.template:
    src: headscale-backup.service.j2
    dest: /etc/systemd/system/headscale-backup.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd for headscale backup
  when: ansible_service_mgr == 'systemd'

- name: Install headscale backup timer unit
  ansible.builtin.template:
    src: headscale-backup.timer.j2
    dest: /etc/systemd/system/headscale-backup.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd for headscale backup
  when: ansible_service_mgr == 'systemd'

- name: Flush handlers so the timer sees the latest unit definitions
  ansible.builtin.meta: flush_handlers

- name: Enable and start headscale backup timer
  ansible.builtin.systemd:
    name: headscale-backup.timer
    enabled: true
    state: started
  when: ansible_service_mgr == 'systemd'
