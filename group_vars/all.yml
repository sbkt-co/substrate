---
# Canonical pointers to the control plane. Every node converges itself from
# whatever is committed here on the branch it tracks.

substrate_repo_url: "https://github.com/sbkt-co/substrate.git"
# This default is the fallback when no /etc/substrate/branch seed exists (e.g.
# the test harness). Production/staging nodes have their tracked branch seeded at
# bootstrap into /etc/substrate/branch and pinned by local.yml, so production
# tracks `main` and staging tracks `staging` without per-node repo config. Never
# override substrate_branch in host_vars — that would break fast-forward
# promotion (host_vars must stay identical across main and staging).
substrate_branch: "main"
substrate_playbook: "local.yml"

# How often a node reconciles itself against the control plane, and how much
# random jitter to spread fleet-wide load. These drive the systemd timer the
# reconciler role installs. Values use systemd time syntax.
substrate_reconcile_interval: "15min"
substrate_reconcile_splay: "120s"
substrate_reconcile_on_boot_sec: "5min"

# Default role layers applied to a node when host_vars/<hostname>.yml does not
# specify any. The base substrate (common + reconciler) is always applied by
# local.yml regardless of this list.
node_roles: []

# --- Tailnet + certificates (fleet-wide) ---

# Node-local secret material lives here, seeded at bootstrap or by an operator
# (same pattern as /etc/substrate/branch). Values NEVER live in this repo; the
# repo only specifies the path a role reads. Roles that need a missing secret
# skip with a loud warning rather than failing the whole converge.
substrate_secrets_dir: /etc/substrate/secrets

# Public apex domain (Cloudflare-managed) and the tailnet subdomain under it.
# MagicDNS names every node <hostname>.{{ substrate_tailnet_domain }}; hosts
# never get public DNS records and the only public cert artifact is the
# wildcard, so internal topology stays out of CT logs and public DNS.
substrate_domain: sbkt.co
substrate_tailnet_domain: net.sbkt.co

# Headscale coordination server URL as reachable BY CLIENTS. Left empty here
# because it is topology-specific and MUST be set per-node in host_vars for any
# node that runs the `tailnet` or `headscale` role — there is no safe fleet-wide
# default. Examples:
#   - staging fleet: "http://staging-core.incus:8080" (see host_vars/staging-*.yml)
#   - production:    "https://<core-node>.net.sbkt.co:8080" once the tailnet is up,
#                    or the public headscale endpoint if one is fronted.
# First bring-up ordering note: a production core node must converge headscale and
# join its own tailnet before this URL resolves for peers. A node whose tailnet
# role runs before the coordinator is reachable skips enrollment with a warning
# and retries on the next reconcile — set the URL and re-converge the core first.
substrate_headscale_url: ""

# ACME: use the Let's Encrypt STAGING endpoint until the setup is trusted —
# untrusted certs, but no rate-limit exposure while iterating. Flip to false
# for real certs.
substrate_acme_staging: true
substrate_acme_email: "hostmaster@sbkt.co"
