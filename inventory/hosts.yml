---
# ansible-pull always converges the local node against `main`, so the only
# host that matters at apply time is localhost. This file exists so that
# `ansible-lint`, `--syntax-check`, and ad-hoc local runs have an inventory.
#
# Node identity / role differentiation is NOT expressed here. A node selects
# its own role layers from host_vars/<hostname>.yml (see host_vars/example.yml).
all:
  hosts:
    localhost:
      ansible_connection: local
